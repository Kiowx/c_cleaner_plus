name: Build and Release Windows EXE

# 触发条件：
on:
  # 1. 当 main/master 分支的 main.py 有新提交时自动触发
  push:
    branches:
      - 'main'
      - 'master'
    paths:
      - 'main.py'
  # 2. 允许在 GitHub 网页上纯手动点击触发
  workflow_dispatch:

# 赋予 GitHub Action 创建 Release 和上传文件的权限
permissions:
  contents: write

jobs:
  build:
    name: Package Windows Executable
    runs-on: windows-latest

    steps:
    - name: 1. 检出代码 (Checkout code)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 2. 从 main.py 提取版本号并自动创建 Tag (Extract version & create tag)
      shell: bash
      run: |
        # 从 main.py 中提取版本号
        VERSION=$(grep -oE 'CURRENT_VERSION\s*=\s*"[^"]+"' main.py | grep -oE '"[^"]+"' | tr -d '"')
        if [ -z "$VERSION" ]; then
          echo "❌ 错误：无法从 main.py 中提取 CURRENT_VERSION"
          exit 1
        fi

        RELEASE_TAG="v${VERSION}"
        echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV
        echo "📦 提取到版本号: ${RELEASE_TAG}"

        # 检查该 tag 是否已存在
        if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
          echo "⚠️ Tag ${RELEASE_TAG} 已存在，跳过创建"
        else
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release ${RELEASE_TAG}"
          git push origin "$RELEASE_TAG"
          echo "✅ 已自动创建并推送 Tag: ${RELEASE_TAG}"
        fi

    - name: 3. 设置 Python 环境 (Set up Python)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 4. 安装依赖库 (Install dependencies)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 5. 安装 UPX 压缩工具 (Install UPX)
      run: choco install upx

    - name: 6. 执行 Spec 打包 (Build executable)
      run: pyinstaller c_cleaner_plus.spec --clean
      env:
        PYTHONIOENCODING: utf8

    - name: 7. 提取 main.py 的专属完整更新日志 (Extract main.py commits)
      shell: bash
      run: |
        # 尝试寻找上一个版本 Tag（排除当前 tag，找到前一个）
        PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ env.RELEASE_TAG }}$" | head -n 1 || echo "")

        # 提取 Extended description (%b) 到临时文件
        if [ -z "$PREV_TAG" ]; then
          git log --format="%b" -- main.py > temp_log.txt
        else
          git log --format="%b" $PREV_TAG..HEAD -- main.py > temp_log.txt
        fi

        # 过滤空白行，直接写入正式日志
        if [ -s temp_log.txt ]; then
          grep -v '^[[:space:]]*$' temp_log.txt > main_release_notes.txt
        fi

        touch main_release_notes.txt

        echo "" >> main_release_notes.txt
        echo "---" >> main_release_notes.txt

        rm -f temp_log.txt

    - name: 8. 自动创建 GitHub Release 并上传 (Create Release)
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.exe
        tag_name: ${{ env.RELEASE_TAG }}
        name: ${{ env.RELEASE_TAG }}
        body_path: main_release_notes.txt
        prerelease: ${{ contains(env.RELEASE_TAG, 'alpha') || contains(env.RELEASE_TAG, 'beta') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
